<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django To-Do Uygulaması</title>
    <style>
      /* Sayfamız biraz profesyonel görünsün diye küçük bir stil ekleyelim */
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        background-color: #f4f4f4;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        text-align: center;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        padding: 10px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
      .status-icon {
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Yapılacaklar Listesi</h1>

      <form method="POST" style="margin-bottom: 20px; display: flex; gap: 10px">
        {% csrf_token %}
        <input
          type="text"
          name="title"
          placeholder="Yeni görev yaz..."
          required
          style="flex: 1; padding: 10px"
        />
        <button
          type="submit"
          style="
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
          "
        >
          Ekle
        </button>
      </form>

      <ul>
        {% for task in tasks %}
        <li>
          <span class="{% if task.completed %}completed{% endif %}">
            {{ task.title }}
          </span>

          <div>
            <a
              href="{% url 'complete_task' task.id %}"
              style="text-decoration: none"
              >{% if task.completed %}↩️{% else %}✅{% endif %}</a
            >
            <a
              href="{% url 'delete_task' task.id %}"
              style="text-decoration: none; margin-left: 10px"
              >🗑️</a
            >
          </div>
        </li>
        {% empty %}
        <li>Henüz bir görev yok. Yukarıdan ekleyebilirsin!</li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
